# nobbn.com 微信 Webhook 反向代理配置
# 合并到 /etc/nginx/sites-available/nobbn.com 或单独 include

server {
  listen 443 ssl;
  server_name nobbn.com;

  ssl_certificate     /etc/letsencrypt/live/nobbn.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/nobbn.com/privkey.pem;

  # 微信 Webhook 入口
  location /wechat {
    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# HTTP 自动跳转 HTTPS
server {
  listen 80;
  server_name nobbn.com;
  return 301 https://$host$request_uri;
}
