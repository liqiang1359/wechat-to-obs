# 微信订阅号配置（mp.weixin.qq.com → 设置与开发 → 基本配置）
wechat:
  token: your_token_here
  app_id: your_app_id_here
  app_secret: your_app_secret_here

# Flask 服务监听（配合 Cloudflare Tunnel 时用 127.0.0.1，仅本机访问）
server:
  port: 5000
  host: 127.0.0.1

# WebDAV 同步目标（Obsidian Vault 根目录）
webdav:
  url: http://dav.nobbn.com/Obsidian
  username: your_webdav_username
  password: your_webdav_password

# 业务选项
options:
  fetch_full_article: true
  inbox_dir: Inbox
  attachment_dir: Attachments
  jina_timeout: 30
  # WebDAV 上传超时（秒），大图建议 120
  webdav_upload_timeout: 120
  # 笔记首行显示的姓名
  note_author: 徐行
  # 同一用户连续发消息时合并为一个文件
  merge_enabled: true
  # 合并时间窗口（秒），默认 300 = 5 分钟
  merge_window_seconds: 300
